<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SPLIT — workout plan builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080A0F;--bg2:#0B0E15;--glass:rgba(255,255,255,.025);--glass2:rgba(255,255,255,.045);--glass3:rgba(255,255,255,.07);--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);--text:#EAEEF5;--muted:#7C879B;--muted2:#525C6E;--acc:#4FE6E0;--acc-dim:#1F7E7A;--acc-glow:rgba(79,230,224,.30);--c-empty:rgba(255,255,255,.05);--c-under:#2D5B96;--c-build:#23A6BE;--c-opt:#35C76A;--c-high:#E8C13D;--c-vhigh:#E8533C;--body-base:rgba(150,170,200,.10);--p-push:#5B9DFF;--p-pull:#A77BFF;--p-legs:#FF8A5B;--p-core:#E8C13D;--disp:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:13px}
  *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;position:relative;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(60% 50% at 15% -5%, rgba(79,230,224,.07), transparent 60%),radial-gradient(50% 50% at 100% 0%, rgba(91,157,255,.06), transparent 55%),var(--bg)}
  body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at 50% 30%,#000 0%,transparent 78%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input{font-family:inherit}
  ::selection{background:var(--acc);color:#04201f}a{color:inherit}
  header{position:sticky;top:0;z-index:40;background:rgba(8,10,15,.7);backdrop-filter:blur(18px) saturate(140%);border-bottom:1px solid var(--line)}
  .bar{max-width:1200px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
  .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),#2bbfb9);display:grid;place-items:center;box-shadow:0 0 24px var(--acc-glow),inset 0 0 0 1px rgba(255,255,255,.2)}
  .logo svg{width:18px;height:18px;display:block}
  .brand b{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.32em;padding-left:.32em}
  .plan-title{flex:1;min-width:180px;background:transparent;border:1px solid transparent;color:var(--text);font-family:var(--disp);font-weight:600;font-size:20px;letter-spacing:-.01em;padding:7px 10px;border-radius:9px}
  .plan-title:hover{background:var(--glass)}.plan-title:focus{outline:none;background:var(--glass);border-color:var(--line2)}
  .bar-actions{display:flex;gap:9px;flex-shrink:0}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 15px;border-radius:10px;font-weight:500;font-size:13.5px;letter-spacing:.01em;border:1px solid var(--line2);background:var(--glass);color:var(--text);transition:.16s;white-space:nowrap;backdrop-filter:blur(6px)}
  .btn:hover{background:var(--glass2);border-color:var(--muted2)}.btn svg{width:15px;height:15px}
  .btn.primary{background:linear-gradient(135deg,var(--acc),#33c8c2);border-color:transparent;color:#04201f;font-weight:600;box-shadow:0 0 22px var(--acc-glow)}.btn.primary:hover{filter:brightness(1.08)}
  main{max-width:1200px;margin:0 auto;padding:26px 22px 30px;display:grid;grid-template-columns:1fr 380px;gap:26px;align-items:start}
  @media(max-width:940px){main{grid-template-columns:1fr}}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted2)}
  .days{display:flex;flex-direction:column;gap:16px}
  .day{background:var(--glass);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;backdrop-filter:blur(8px);animation:rise .5s ease both}
  .day-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.025),transparent)}
  .day-letter{width:32px;height:32px;border-radius:9px;background:var(--glass2);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:15px;color:var(--acc);flex-shrink:0}
  .day-name{flex:1;background:transparent;border:1px solid transparent;color:var(--text);font-family:var(--disp);font-weight:600;font-size:17px;padding:6px 9px;border-radius:8px;letter-spacing:-.01em}
  .day-name:hover{background:var(--glass2)}.day-name:focus{outline:none;background:var(--glass2);border-color:var(--line2)}
  .day-meta{font-family:var(--mono);font-size:11px;color:var(--muted2);white-space:nowrap;letter-spacing:.04em}
  .icon-btn{width:31px;height:31px;border-radius:8px;display:grid;place-items:center;color:var(--muted2);flex-shrink:0;transition:.15s}
  .icon-btn:hover{background:var(--glass3);color:var(--text)}.icon-btn svg{width:16px;height:16px}
  .ex-list{display:flex;flex-direction:column}
  .ex{display:flex;align-items:center;gap:13px;padding:11px 16px;border-top:1px solid var(--line);transition:background .15s}

  .ex-tag{width:4px;height:34px;border-radius:4px;flex-shrink:0;box-shadow:0 0 10px currentColor}
  .ex-main{flex:1;min-width:0}.ex-name{font-weight:500;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .ex-name a{color:var(--muted2);display:inline-flex;flex-shrink:0;transition:.15s}.ex-name a:hover{color:var(--acc)}.ex-name a svg{width:14px;height:14px}
  .ex-muscles{font-size:12px;color:var(--muted2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sets{display:flex;align-items:center;gap:7px;flex-shrink:0}
  .sets-ctrl{width:27px;height:27px;border-radius:8px;background:var(--glass2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);font-weight:600;font-size:16px;transition:.15s}
  .sets-ctrl:hover{background:var(--glass3);color:var(--acc);border-color:var(--acc-dim)}
  .sets-val{font-family:var(--mono);font-size:12.5px;min-width:50px;text-align:center;color:var(--muted)}.sets-val b{color:var(--text);font-weight:700}
  .ex .icon-btn{width:27px;height:27px}.day-empty{padding:18px 16px;color:var(--muted2);font-size:13.5px;text-align:center}
  .add-row{padding:12px 16px;border-top:1px solid var(--line)}
  .add-ex{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;border:1px solid var(--line2);border-radius:11px;background:var(--glass2);color:var(--text);font-family:var(--disp);font-weight:500;font-size:14px;letter-spacing:.01em;transition:.16s}
  .add-ex:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 22px var(--acc-glow);background:rgba(79,230,224,.05)}
  .add-ex svg{width:17px;height:17px;flex-shrink:0}.add-ex .hint{margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--muted2);font-weight:400}.add-ex:hover .hint{color:var(--acc-dim)}
  .add-day{display:flex;align-items:center;justify-content:center;gap:9px;padding:15px;border:1px dashed var(--line2);border-radius:var(--r);color:var(--muted);font-family:var(--disp);font-weight:500;font-size:14px;letter-spacing:.02em;width:100%;transition:.16s;background:transparent}
  .add-day:hover{border-color:var(--acc);color:var(--acc);background:rgba(79,230,224,.04);box-shadow:0 0 22px var(--acc-glow)}.add-day svg{width:16px;height:16px}
  .panel{position:sticky;top:88px;display:flex;flex-direction:column;gap:18px}
  @media(max-width:940px){.panel{position:static}}
  .card{background:var(--glass);border:1px solid var(--line);border-radius:var(--r);padding:19px;backdrop-filter:blur(8px);animation:rise .55s ease both}
  .card h3{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;color:var(--text)}
  .card h3::before{content:'';width:6px;height:6px;border-radius:2px;background:var(--acc);box-shadow:0 0 8px var(--acc);margin-right:9px}.card h3 .eyebrow{margin-left:auto}
  .totals{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .stat{background:var(--glass2);border:1px solid var(--line);border-radius:11px;padding:13px 12px}
  .stat .n{font-family:var(--disp);font-weight:600;font-size:28px;letter-spacing:-.02em;line-height:1}
  .stat .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-top:7px}
  .scanner{position:relative;border:1px solid var(--line);border-radius:12px;background:radial-gradient(70% 60% at 50% 35%, rgba(79,230,224,.06), transparent 70%), rgba(255,255,255,.012);padding:14px 8px 8px;overflow:hidden}
  .scanner .scan-grid{position:absolute;inset:0;opacity:.4;pointer-events:none;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:22px 22px;mask-image:radial-gradient(circle at 50% 45%,#000,transparent 80%)}
  .scanner .scanline{position:absolute;left:6%;right:6%;height:1px;top:0;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.5;box-shadow:0 0 12px var(--acc);animation:scan 4.5s ease-in-out infinite;pointer-events:none}
  .cnr{position:absolute;width:13px;height:13px;border:1.5px solid var(--acc-dim);pointer-events:none}
  .cnr.tl{top:7px;left:7px;border-right:none;border-bottom:none;border-radius:4px 0 0 0}.cnr.tr{top:7px;right:7px;border-left:none;border-bottom:none;border-radius:0 4px 0 0}
  .cnr.bl{bottom:7px;left:7px;border-right:none;border-top:none;border-radius:0 0 0 4px}.cnr.br{bottom:7px;right:7px;border-left:none;border-top:none;border-radius:0 0 4px 0}
  .map-wrap{display:flex;gap:6px;justify-content:center;position:relative;z-index:1}.map-col{flex:1;max-width:158px;text-align:center}
  .map-col svg{width:100%;height:auto;display:block;filter:drop-shadow(0 0 14px rgba(79,230,224,.12))}
  .map-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin-top:2px}
  .region{transition:fill .45s ease}.body-base{fill:var(--body-base)}
  .legend{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:13px;justify-content:center}
  .legend .sw{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}.legend .dot{width:11px;height:11px;border-radius:3px}
  .vbars{display:flex;flex-direction:column;gap:8px}.vbar{display:grid;grid-template-columns:80px 1fr 32px;align-items:center;gap:10px}
  .vbar .vn{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vtrack{height:8px;background:var(--glass2);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .vfill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.2,.7,.2,1), background .3s;box-shadow:0 0 10px currentColor}
  .vval{font-family:var(--mono);font-size:11.5px;text-align:right;color:var(--muted)}.note{font-size:11px;color:var(--muted2);margin-top:13px;line-height:1.45}
  .empty-stats{color:var(--muted2);font-size:13px;text-align:center;padding:12px 0}
  .sheet-bg{position:fixed;inset:0;background:rgba(4,6,10,.6);backdrop-filter:blur(5px);z-index:80;opacity:0;pointer-events:none;transition:opacity .28s}
  .sheet-bg.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;z-index:81;display:flex;flex-direction:column;background:rgba(11,14,21,.97);backdrop-filter:blur(20px) saturate(140%);border:1px solid var(--line2);transition:transform .36s cubic-bezier(.22,.7,.18,1)}
  @media(min-width:721px){.sheet{top:0;right:0;height:100%;width:min(470px,100%);border-right:none;box-shadow:-30px 0 80px rgba(0,0,0,.5);transform:translateX(100%)}.sheet.show{transform:none}}
  @media(max-width:720px){.sheet{left:0;right:0;bottom:0;height:90vh;width:100%;border-radius:20px 20px 0 0;border-bottom:none;box-shadow:0 -20px 60px rgba(0,0,0,.5);transform:translateY(100%)}.sheet.show{transform:none}}
  .sheet-grip{display:none}@media(max-width:720px){.sheet-grip{display:block;width:40px;height:4px;border-radius:3px;background:var(--line2);margin:9px auto 2px}}
  .sheet-head{display:flex;align-items:center;gap:12px;padding:14px 18px 12px}.sheet-head .t{flex:1;min-width:0}
  .sheet-head .t .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2)}
  .sheet-head .t .nm{font-family:var(--disp);font-weight:600;font-size:18px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sheet-close{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted);background:var(--glass2);border:1px solid var(--line);flex-shrink:0;transition:.15s}
  .sheet-close:hover{color:var(--text);background:var(--glass3)}.sheet-close svg{width:17px;height:17px}
  .sheet-search{position:relative;padding:0 18px 12px}
  .sheet-search .si{position:absolute;left:31px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none}.sheet-search .si svg{width:16px;height:16px;display:block}
  .sheet-search input{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:11px;padding:12px 38px 12px 40px;color:var(--text);font-size:14.5px;transition:.15s}
  .sheet-search input::placeholder{color:var(--muted2)}.sheet-search input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-glow)}
  .sheet-search .clr{position:absolute;right:30px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:6px;display:none;place-items:center;color:var(--muted2)}.sheet-search .clr.on{display:grid}.sheet-search .clr:hover{color:var(--text);background:var(--glass2)}.sheet-search .clr svg{width:14px;height:14px}
  .tabs{display:flex;gap:6px;padding:0 18px 12px}
  .tab{flex:1;padding:8px;border-radius:9px;background:var(--glass);border:1px solid var(--line);color:var(--muted);font-family:var(--disp);font-weight:500;font-size:13px;letter-spacing:.02em;transition:.15s;text-align:center}
  .tab:hover{color:var(--text)}.tab.on{background:var(--glass3);color:var(--acc);border-color:var(--acc-dim);box-shadow:inset 0 0 14px rgba(79,230,224,.08)}
  .sheet-body{flex:1;overflow-y:auto;padding:4px 18px 10px;-webkit-overflow-scrolling:touch}

  @keyframes slideR{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}@keyframes slideL{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding-top:6px}

  .cat .ic{width:32px;height:32px;border-radius:9px;background:var(--glass2);display:grid;place-items:center;color:var(--acc)}.cat .ic svg{width:18px;height:18px}
  .cat .cn{font-family:var(--disp);font-weight:600;font-size:15.5px}.cat .cc{font-family:var(--mono);font-size:11px;color:var(--muted2)}.cat .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc);opacity:.5}
  .back-row{display:flex;align-items:center;gap:9px;padding:8px 0 12px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-family:var(--disp);font-weight:500;font-size:14px;padding:6px 10px 6px 6px;border-radius:9px;transition:.15s}.back-btn:hover{color:var(--acc);background:var(--glass)}.back-btn svg{width:18px;height:18px}
  .back-row .ttl{font-family:var(--disp);font-weight:600;font-size:16px;margin-left:2px}.back-row .cnt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted2)}

  .mv-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-top:1px solid var(--line);width:100%;text-align:left}
  .mv-row:first-child{border-top:none}.mv-row:hover{background:rgba(255,255,255,.02)}

  .mv-row .mm{flex:1;min-width:0}.mv-row .mn{font-weight:500;font-size:14.5px}

  .mv-row .mv-ch{width:20px;height:20px;color:var(--muted2);flex-shrink:0}.mv-row:hover .mv-ch{color:var(--acc)}

  .preview .pl{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2)}
  .preview .pn{font-family:var(--disp);font-weight:600;font-size:19px;margin:5px 0 5px;letter-spacing:-.01em;line-height:1.15}.preview .pmu{font-size:12px;color:var(--muted)}
  .cfg-sets{display:flex;align-items:center;gap:12px;margin-bottom:10px}.cfg-sets .sl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2)}
  .cfg-sets .stepper{display:flex;align-items:center;gap:10px;margin-left:auto}
  .cfg-sets .stepper button{width:30px;height:30px;border-radius:9px;background:var(--glass2);border:1px solid var(--line2);color:var(--muted);font-size:17px;font-weight:600}.cfg-sets .stepper button:hover{color:var(--acc);border-color:var(--acc-dim)}
  .cfg-sets .stepper .v{font-family:var(--mono);min-width:58px;text-align:center;color:var(--text)}
  .cfg-add{width:100%;margin-top:4px;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--acc),#33c8c2);color:#04201f;font-family:var(--disp);font-weight:700;font-size:15px;box-shadow:0 0 22px var(--acc-glow);transition:.15s}.cfg-add:hover{filter:brightness(1.08)}.cfg-add.done{background:var(--glass3);color:var(--acc);box-shadow:none}
  .sheet-foot{display:flex;align-items:center;gap:12px;padding:13px 18px;border-top:1px solid var(--line);background:rgba(8,10,15,.6)}.sheet-foot .fc{flex:1;font-family:var(--mono);font-size:11.5px;color:var(--muted);min-width:0}.sheet-foot .fc b{color:var(--acc);font-weight:700}

    if(q&&((lbl&&lbl.length>1&&q.includes(lbl))||(tg&&tg.length>2&&q.includes(tg))))sel[t.k]=o.v;});});return sel;}
function moveRow(m){const cnt=dayMoveCount(m.idx);const nv=countVariations(m);
  const sub=cap(m.pat)+' · '+m.p.map(x=>M[x]).join(', ')+(nv>1?` · ${nv} variations`:'');
  const right=cnt>0?`<span class="mv-badge">${cnt}</span>`:`<svg class="mv-ch" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return `<button class="mv-row" data-move="${m.idx}"><div class="pt" style="color:${PATTERN_COLOR[m.pat]};background:${PATTERN_COLOR[m.pat]}"></div><div class="mm"><div class="mn">${esc(m.name)}</div><div class="ms">${esc(sub)}</div></div>${right}</button>`;}
function catGridHTML(){if(pk.mode==='muscle'){return `<div class="cat-grid">${GROUPS.map(g=>{const c=MV.filter(m=>m.p.some(x=>g.muscles.includes(x))).length;return `<button class="cat" data-cat="${g.key}"><span class="bar"></span><span class="ic">${catIcon(g.key)}</span><span class="cn">${g.name}</span><span class="cc">${c} movements</span></button>`;}).join('')}</div>`;}
  return `<div class="cat-grid">${EQUIP_ORDER.filter(eq=>MV.some(m=>supportsEq(m,eq))).map(eq=>{const c=MV.filter(m=>supportsEq(m,eq)).length;return `<button class="cat" data-eq="${eq}"><span class="bar"></span><span class="ic">${equipIcon()}</span><span class="cn">${eq}</span><span class="cc">${c} movements</span></button>`;}).join('')}</div>`;}
function groupDetailHTML(){let list,title,chips='';
  if(pk.mode==='muscle'){const g=GROUPS.find(x=>x.key===pk.group);if(!g){pk.level=0;return catGridHTML();}title=g.name;
    list=MV.filter(m=>m.p.some(x=>pk.sub?x===pk.sub:g.muscles.includes(x)));
    chips=`<div class="chips"><button class="chip ${!pk.sub?'on':''}" data-sub="">All</button>${g.muscles.map(x=>`<button class="chip ${pk.sub===x?'on':''}" data-sub="${x}">${M[x]}</button>`).join('')}</div>`;
  }else{title=pk.group;list=MV.filter(m=>supportsEq(m,pk.group));}
  list=list.slice().sort((a,b)=>a.name.localeCompare(b.name));
  return `<div class="back-row"><button class="back-btn" data-to="0"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Browse</button><span class="ttl">${esc(title)}</span><span class="cnt">${list.length}</span></div>${chips}<div class="pick-list">${list.map(moveRow).join('')||'<div class="pick-none">Nothing here.</div>'}</div>`;}
function searchHTML(){const list=scoreMove(pk.q);return list.length?`<div class="pick-list">${list.map(moveRow).join('')}</div>`:`<div class="pick-none">No matches for “${esc(pk.q)}”.</div>`;}
function configHTML(){const m=MV[pk.cfgMid];const r=resolveSel(m,pk.cfgSel);const dn=esc(plan.days.find(d=>d.id===pk.dayId)?.name||'day');
  const tiers=(m.tiers||[]).map(t=>`<div class="tier"><div class="tl">${t.label}</div><div class="chips">${t.opts.map(o=>{const sv=pk.cfgSel[t.k]!==undefined?pk.cfgSel[t.k]:t.opts[0].v;return `<button class="chip ${sv===o.v?'on':''}" data-tier="${t.k}" data-opt="${o.v}">${esc(o.label||o.tag||'Standard')}</button>`;}).join('')}</div></div>`).join('');
  const mus=[...r.p,...r.s].map(x=>M[x]).join(', ');
  return `<div class="back-row"><button class="back-btn" data-to="1"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</button><span class="ttl">${esc(m.name)}</span></div>${tiers||'<div class="note" style="margin:0 0 14px">No variations — just set your sets.</div>'}<div class="preview"><div class="pl">You're adding</div><div class="pn">${esc(r.name)}</div><div class="pmu">${esc(mus)}</div></div><div class="cfg-sets"><span class="sl">Sets</span><div class="stepper"><button data-cfgsets="-">–</button><span class="v">${pk.cfgSets} sets</span><button data-cfgsets="+">+</button></div></div><button class="cfg-add ${pk.justAdded?'done':''}" id="pkAdd">${pk.justAdded?'Added ✓':'Add to '+dn}</button>`;}
function renderTabs(){const show=(pk.level!==2)&&!pk.q.trim();$('#pickTabs').style.display=show?'flex':'none';document.querySelectorAll('#pickTabs .tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===pk.mode));}
function renderPickBody(animate,dir){const body=$('#pickBody');const prev=body.scrollTop;let html;
  if(pk.level===2&&pk.cfgMid!=null)html=configHTML();
  else if(pk.q.trim())html=searchHTML();
  else if(pk.level===1&&pk.group)html=groupDetailHTML();
  else{pk.level=0;html=catGridHTML();}
  body.innerHTML=`<div class="${animate?(dir==='l'?'slide-l':'slide-r'):''}">${html}</div>`;
  bindPickEvents();if(animate)body.scrollTop=0;else body.scrollTop=prev;}
function updateFoot(){const d=plan.days.find(x=>x.id===pk.dayId);const n=d?d.ex.length:0;const s=d?d.ex.reduce((a,e)=>a+e.sets,0):0;$('#pickFc').innerHTML=`<b>${n}</b> exercises · ${s} sets in ${esc(d?d.name:'')}`;}
function openMove(idx){pk.cfgMid=idx;pk.cfgSel=presel(MV[idx]);pk.cfgSets=3;pk.justAdded=false;pk.level=2;renderTabs();renderPickBody(true,'r');}
function addConfigured(){const m=MV[pk.cfgMid];const sel={};(m.tiers||[]).forEach(t=>sel[t.k]=pk.cfgSel[t.k]!==undefined?pk.cfgSel[t.k]:t.opts[0].v);
  const d=plan.days.find(x=>x.id===pk.dayId);if(!d)return;d.ex.push({uid:uid(),mid:pk.cfgMid,sel,sets:pk.cfgSets});updateFoot();updateHash();
  pk.justAdded=true;renderPickBody(false);clearTimeout(pk._t);pk._t=setTimeout(()=>{pk.justAdded=false;if(pk.open&&pk.level===2)renderPickBody(false);},1100);}
function bindPickEvents(){const body=$('#pickBody');
  body.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{pk.group=b.dataset.cat;pk.sub=null;pk.level=1;renderTabs();renderPickBody(true,'r');});
  body.querySelectorAll('[data-eq]').forEach(b=>b.onclick=()=>{pk.group=b.dataset.eq;pk.sub=null;pk.level=1;renderTabs();renderPickBody(true,'r');});
  body.querySelectorAll('[data-sub]').forEach(b=>b.onclick=()=>{pk.sub=b.dataset.sub||null;renderPickBody(false);});
  body.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>openMove(+b.dataset.move));
  body.querySelectorAll('[data-tier]').forEach(b=>b.onclick=()=>{pk.cfgSel[b.dataset.tier]=b.dataset.opt;pk.justAdded=false;renderPickBody(false);});
  body.querySelectorAll('[data-cfgsets]').forEach(b=>b.onclick=()=>{pk.cfgSets=Math.max(1,Math.min(12,pk.cfgSets+(b.dataset.cfgsets==='+'?1:-1)));pk.justAdded=false;renderPickBody(false);});
  const add=body.querySelector('#pkAdd');if(add)add.onclick=addConfigured;
  const back=body.querySelector('.back-btn');if(back)back.onclick=()=>{const to=+back.dataset.to;if(to===0){pk.group=null;pk.sub=null;}pk.cfgMid=null;pk.level=to;renderTabs();renderPickBody(true,'l');};}
function openPicker(dayId){pk.open=true;pk.dayId=dayId;pk.mode='muscle';pk.level=0;pk.group=null;pk.sub=null;pk.q='';pk.cfgMid=null;pk.cfgSel={};pk.justAdded=false;
  document.body.style.overflow='hidden';$('#pickName').textContent=plan.days.find(d=>d.id===dayId)?.name||'Day';$('#pickSearch').value='';$('#pickClr').classList.remove('on');
  $('#sheetBg').classList.add('show');$('#sheet').classList.add('show');renderTabs();renderPickBody(true,'r');updateFoot();
  setTimeout(()=>{if(window.matchMedia('(min-width:721px)').matches)$('#pickSearch').focus();},260);}
function closePicker(){if(!pk.open)return;pk.open=false;document.body.style.overflow='';$('#sheetBg').classList.remove('show');$('#sheet').classList.remove('show');render();}
function bindDayEvents(){
  document.querySelectorAll('input.day-name').forEach(inp=>{inp.oninput=()=>{const d=plan.days.find(x=>x.id===inp.dataset.day);d.name=inp.value;inp.closest('.day').querySelector('.day-letter').textContent=(inp.value.trim()[0]||'?').toUpperCase();updateHash();};});
  document.querySelectorAll('[data-del-day]').forEach(b=>b.onclick=()=>{plan.days=plan.days.filter(d=>d.id!==b.dataset.delDay);render();});
  document.querySelectorAll('[data-sets]').forEach(b=>b.onclick=()=>{const d=plan.days.find(x=>x.id===b.dataset.day);const it=d.ex.find(e=>e.uid===b.dataset.ex);it.sets=Math.max(1,Math.min(12,it.sets+(b.dataset.sets==='+'?1:-1)));render();});
  document.querySelectorAll('[data-del-ex]').forEach(b=>b.onclick=()=>{const d=plan.days.find(x=>x.id===b.dataset.day);d.ex=d.ex.filter(e=>e.uid!==b.dataset.delEx);render();});
  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openPicker(b.dataset.open));}
$('#planTitle').oninput=e=>{plan.title=e.target.value;updateHash();};
$('#addDay').onclick=()=>{const used=new Set(plan.days.map(d=>d.name));const name=DEFAULT_DAY_NAMES.find(n=>!used.has(n))||('Day '+(plan.days.length+1));plan.days.push({id:uid(),name,ex:[]});render();setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),60);};
let _clearArmed=false,_clearT;
$('#clearAll').onclick=()=>{const b=$('#clearAll');if(!_clearArmed){_clearArmed=true;b.textContent='Tap again to clear';b.classList.add('confirm');clearTimeout(_clearT);_clearT=setTimeout(()=>{_clearArmed=false;b.textContent='Clear all';b.classList.remove('confirm');},3000);return;}clearTimeout(_clearT);_clearArmed=false;b.textContent='Clear all';b.classList.remove('confirm');plan.days=[];render();toast('Plan cleared');};
$('#pickClose').onclick=closePicker;$('#pickDone').onclick=closePicker;$('#sheetBg').onclick=closePicker;
document.querySelectorAll('#pickTabs .tab').forEach(t=>t.onclick=()=>{pk.mode=t.dataset.mode;pk.level=0;pk.group=null;pk.sub=null;pk.cfgMid=null;renderTabs();renderPickBody(true,'r');});
$('#pickSearch').oninput=e=>{pk.q=e.target.value;$('#pickClr').classList.toggle('on',!!pk.q.trim());if(pk.q.trim()){pk.level=0;pk.cfgMid=null;}renderTabs();renderPickBody(false);};
$('#pickSearch').onkeydown=e=>{if(e.key==='Enter'){const f=$('#pickBody').querySelector('[data-move]');if(f)f.click();}else if(e.key==='Escape'){if(pk.q.trim()){pk.q='';e.target.value='';$('#pickClr').classList.remove('on');renderTabs();renderPickBody(true,'l');}else closePicker();}};
$('#pickClr').onclick=()=>{pk.q='';$('#pickSearch').value='';$('#pickClr').classList.remove('on');renderTabs();renderPickBody(true,'l');$('#pickSearch').focus();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&pk.open&&document.activeElement!==$('#pickSearch'))closePicker();});
function encodePlan(){const c={t:plan.title,d:plan.days.map(d=>({n:d.name,e:d.ex.map(x=>[MV[x.mid].key,x.sel||{},x.sets])}))};return btoa(encodeURIComponent(JSON.stringify(c)));}
function decodePlan(str){try{const c=JSON.parse(decodeURIComponent(atob(str)));plan={title:c.t||'Workout Plan',days:(c.d||[]).map(d=>({id:uid(),name:d.n,ex:(d.e||[]).map(([key,sel,sets])=>{const mid=MVKEY[key];return mid==null?null:{uid:uid(),mid,sel:sel||{},sets};}).filter(Boolean)}))};return true;}catch(e){return false;}}
function updateHash(){try{history.replaceState(null,'','#'+encodePlan());}catch(e){}}
$('#shareBtn').onclick=()=>{$('#shareLink').value=location.origin+location.pathname+'#'+encodePlan();$('#modalBg').classList.add('show');};
$('#copyLink').onclick=()=>{const i=$('#shareLink');i.select();navigator.clipboard?.writeText(i.value).then(()=>toast('Link copied')).catch(()=>{document.execCommand('copy');toast('Link copied');});};
$('#modalClose').onclick=()=>$('#modalBg').classList.remove('show');
$('#modalBg').onclick=e=>{if(e.target===$('#modalBg'))$('#modalBg').classList.remove('show');};
let _h2c=null;function ensureH2C(){if(window.html2canvas)return Promise.resolve(window.html2canvas);if(_h2c)return _h2c;_h2c=new Promise((res,rej)=>{const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';sc.onload=()=>res(window.html2canvas);sc.onerror=()=>rej(new Error('load'));document.head.appendChild(sc);});return _h2c;}
$('#imgBtn').onclick=async()=>{toast('Rendering image…');buildShareCard();try{const h2c=await ensureH2C();const canvas=await h2c($('#shareCard'),{backgroundColor:'#080A0F',scale:2});const link=document.createElement('a');link.download=(plan.title||'workout-plan').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.png';link.href=canvas.toDataURL('image/png');link.click();toast('Image saved');}catch(e){toast('Image export needs internet');}};
function buildShareCard(){const vol=computeVolume();const totalSets=plan.days.reduce((a,d)=>a+d.ex.reduce((b,e)=>b+e.sets,0),0);const top=Object.keys(M).map(k=>({name:M[k],v:vol[k]})).sort((a,b)=>b.v-a.v).filter(r=>r.v>0).slice(0,4);
  $('#shareCard').innerHTML=`<div class="sc-head"><div><div class="sc-sub">Workout Plan</div><div class="sc-title">${esc(plan.title)}</div></div><div style="text-align:right"><div class="sc-brand">SPLIT</div><div class="sc-sub">${plan.days.length} days · ${totalSets} sets/wk</div></div></div><div class="sc-grid">${plan.days.map(d=>`<div class="sc-day"><div class="sc-dname">${esc(d.name)} <span>${d.ex.reduce((a,e)=>a+e.sets,0)} sets</span></div>${d.ex.map(it=>`<div class="sc-ex"><span>${esc(resolveItem(it).name)}</span><span class="q">${it.sets}×</span></div>`).join('')||'<div class="sc-ex"><span style="color:#555">—</span></div>'}</div>`).join('')}</div><div class="sc-foot"><span>Top volume: ${top.map(t=>t.name+' '+fmt(t.v)).join('  ·  ')||'—'}</span><span>made with SPLIT</span></div>`;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
let toastT;function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}
// ---- muscle/group breakdown: which exercises count toward a muscle group ----
function showBreakdown(key){
  const grp=GROUPS.find(g=>g.key===key);
  const muscles=grp?grp.muscles:[key];const mset=new Set(muscles);
  const title=grp?grp.name:(M[key]||key);
  const rows=[];let total=0;
  plan.days.forEach(d=>d.ex.forEach(it=>{
    const r=resolveItem(it);
    const pHit=r.p.filter(m=>mset.has(m)),sHit=r.s.filter(m=>mset.has(m));
    if(!pHit.length&&!sHit.length)return;
    const eff=it.sets*pHit.length+it.sets*0.5*sHit.length;total+=eff;
    const tags=[...pHit.map(m=>`${M[m]}`),...sHit.map(m=>`<span class="sec">${M[m]} (2nd)</span>`)].join(', ');
    rows.push({name:r.name,day:d.name,sets:it.sets,eff,tags});
  }));
  rows.sort((a,b)=>b.eff-a.eff);
  const list=rows.length?`<div class="mg-list">${rows.map(r=>`<div class="mg-ex"><div class="mg-ex-main"><div class="mg-ex-name">${esc(r.name)}</div><div class="mg-ex-sub">${esc(r.day)} · ${r.sets} sets · ${r.tags}</div></div><div class="mg-ex-val">${fmt(r.eff)}<span>eff. sets</span></div></div>`).join('')}</div>`:`<div class="mg-empty">No exercises target ${esc(title)} yet.</div>`;
  $('#mgBody').innerHTML=`<h2>${esc(title)}</h2><p>${rows.length} exercise${rows.length===1?'':'s'} · ${fmt(total)} effective sets / week</p>${list}`;
  $('#mgModalBg').classList.add('show');
}
function closeBreakdown(){$('#mgModalBg').classList.remove('show');}
document.addEventListener('click',e=>{const t=e.target.closest('[data-mg]');if(t)showBreakdown(t.dataset.mg);});
$('#mgClose').onclick=closeBreakdown;
$('#mgModalBg').onclick=e=>{if(e.target===$('#mgModalBg'))closeBreakdown();};
addEventListener('keydown',e=>{if(e.key==='Escape')closeBreakdown();});
(function init(){$('#pickSearch').placeholder=`Search ${MV.length} movements…`;const h=location.hash.slice(1);if(h&&decodePlan(h)&&plan.days.length){}else seed();render();})();
</script>
